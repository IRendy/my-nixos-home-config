[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880
blue = #0A9CF5
skyblue = #87CEEB
deepskyblue = #00BFF

[bar/main]
monitor = ${env:MONITOR:}

width = 100%
height = 24pt
radius = 6

dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono:style=Bold:size=11;1"
font-1 = "LXGW Neo XiHei Screen Full:size=11;2"
font-2 = "FiraCode Nerd Font:size=11;4"
font-3 = "Symbols Nerd Font:size=11"

#modules-left = xworkspaces
#modules-right = date
#modules-center = xwindow
#modules-left = xdomenu xworkspaces xwindow
modules-left = xdomenu xworkspaces 
modules-right = pipewire wlan eth systray battery
modules-center = date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = bspwm

[bar/secondary]
monitor = ${env:MONITOR:}

width = 100%
height = 24pt
radius = 6

dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono:style=Bold:size=16;1"
font-1 = "LXGW Neo XiHei Screen Full:size=16;2"
font-2 = "FiraCode Nerd Font:size=16;4"
font-3 = "Symbols Nerd Font:size=16"
font-4 = "CaskaydiaCove Nerd Font:size=16"

#modules-left = xworkspaces
#modules-right = date
#modules-center = xwindow
modules-left = xdomenu xworkspaces xwindow
#modules-right = pulseaudio wlan eth systray
modules-right = pulseaudio touchpad wlan eth
modules-center = date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = bspwm

[module/xdomenu]
type = custom/text
interval = 3

content = " ‚ĚĄÔłŹ"
content-font = 10
content-foreground = ${colors.skyblue}
content-padding = 0


[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = true

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/bspwm]
type = internal/bspwm

pin-workspaces = true

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

label-background = ${colors.background}
label-maxlen = 60

label-empty = " Arch Linux "
label-empty-foreground = ${colors.foreground}
label-empty-background = ${colors.background}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pipewire]
type = internal/pipewire

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

click-right = pavucontrol

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} NC 

[module/wlan]
inherit = network-base
interface-type = wireless
#label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
label-connected = %{F#F0C674}%ifname%%{F-} %essid%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d %H:%M (%a)
date-alt = %Y-%m-%d %H:%M:%S (%A)

label = %date%
label-foreground = ${colors.primary}

[module/touchpad]
type = custom/script
exec = ~/.config/polybar/scripts/check-touchpad.sh
interval = 1
click-left = ~/.config/polybar/scripts/toggle-touchpad.sh
format = %{F#F0C674}TP%{F-} <label>
lable = %output%
format-padding = 2
#format-background = #000000
#format-foreground = ${colors.primary}

[module/battery]
type = internal/battery

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
